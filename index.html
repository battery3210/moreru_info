    <script>
    // JavaScriptで5秒後に動画を非表示に 
        setTimeout(function () {
                    const videoWrapper = document.getElementById('videoWrapper');
                    const mainContent = document.getElementById('main-content');
                    const contentWrapper = document.querySelector('#main-content .main_wrapper');
                    const background = document.querySelector('#main-content .background'); // ← 背景を取得

                    // 動画を非表示にする
                    videoWrapper.style.display = 'none';

                    // フワッと表示開始
                    requestAnimationFrame(() => {
                        mainContent.classList.add('show');   
                        contentWrapper.classList.add('show');
                        background.classList.add('show'); 
                        // document.getElementById('main-content').style.pointerEvents = 'auto';
                    });
        }, 10000); // 10秒
    </script>
