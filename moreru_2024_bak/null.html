                <div class="no_img"><img id="randomImage" src="" alt="ランダムな画像" width="300"></div>

            <!-- <audio class="pc_audio" src="./image/no/BGM.mp3" autoplay></audio> -->

            <button class="mobile_button" id="playButton">つばさをください</button>
        </div>
    </div>

      <script>        
        
        window.addEventListener("load", () => {

      const audioElement = document.getElementById("audioElement");
      const playButton = document.getElementById("playButton");
      const mobileButton = document.querySelector(".mobile_button");


      // 自動再生を試行
      audioElement.play().then(() => {
        //alert("自動再生が成功しました！");
        audioElement.volume = 0.5; // 音量を10%に設定
        mobileButton.style.display = "none";
        playButton.style.display = "none"; 
      }).catch(error => {
        //alert("自動再生に失敗しました:", error.message);
        // 自動再生が失敗した場合にボタンを表示
        playButton.style.display = "block";
        // 再生ボタンのクリックイベントを設定
        playButton.addEventListener("click", () => {
          audioElement.play().then(() => {
            //console.log("再生が成功しました！");
            playButton.style.display = "none"; // 再生成功後にボタンを非表示
            mobileButton.style.display = "none";
          }).catch(error => {
            //console.log("再生に失敗しました:", error.message);
          });
        });
      });
    });
      </script>

    <script>
        // 画像をランダムに表示する関数
        function displayRandomImage() {
        // ランダムな数値（1～6）を生成
        const randomNumber = Math.floor(Math.random() * 7) + 1;

        // 画像のファイルパスを生成
        const imagePath = `image/no/${randomNumber}.png`;

        // img 要素に画像を設定
        const imageElement = document.getElementById("randomImage");
        imageElement.src = imagePath;
        }

        // ページ読み込み時に実行
        displayRandomImage();
    </script>
</body>
